name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 🔥 THIS FIXES YOUR ERROR

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: geek007git
          outputs: dist/github-snake.svg

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}   # 🔥 ADD THIS
          target_branch: output
          build_dir: dist
